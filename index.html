const MF_KEYS=['mf_specialists','mf_doctors','mf_patients','mf_consultations','mf_delete_requests','mf_appointments','mf_appointment_alerts','mf_work_schedules','mf_fields','mf_doctor_fields','mf_field_templates','mf_settings_collapsed','mf_delete_keyword','mf_patient_notes','mf_draft_consultations','mf_weekly_work_schedules','mf_side_delete_enabled','mf_viewed_consult_datetime','mf_patient_events'];
let mfSharedRef=null,mfSharedHandler=null,mfCloudReady=false;
function mfAuthError(e){let c=e?.code||'';if(c.includes('email-already-in-use'))return 'Такий email вже зареєстрований.';if(c.includes('invalid-email'))return 'Некоректний email.';if(c.includes('wrong-password')||c.includes('invalid-credential'))return 'Невірний email або пароль.';if(c.includes('user-not-found'))return 'Користувача з таким email не знайдено.';if(c.includes('weak-password'))return 'Пароль має бути мінімум 6 символів.';if(c.includes('too-many-requests'))return 'Забагато спроб. Спробуйте пізніше.';if(c.includes('popup-closed-by-user'))return 'Вікно Google-входу було закрито.';if(c.includes('popup-blocked'))return 'Браузер заблокував pop-up. Дозвольте спливаючі вікна або спробуйте ще раз.';if(c.includes('permission-denied'))return 'Немає доступу до Firebase Database. Перевірте Rules.';return e?.message||'Сталася помилка.'}
function mfLocalSnapshot(){let o={};MF_KEYS.forEach(k=>{try{let raw=localStorage.getItem(k); if(raw!==null)o[k]=JSON.parse(raw)}catch(e){}});return o}
function mfApplyCloudData(data){
  window.MED_APPLYING_CLOUD=true;
  data=data||{};
  if(data.mf_specialists!==undefined)specialists=data.mf_specialists;
  if(data.mf_doctors!==undefined)doctors=data.mf_doctors;
  if(data.mf_patients!==undefined)patients=data.mf_patients;
  if(data.mf_consultations!==undefined)consultations=data.mf_consultations;
  if(data.mf_delete_requests!==undefined)deleteRequests=data.mf_delete_requests;
  if(data.mf_appointments!==undefined)appointments=data.mf_appointments;
  if(data.mf_appointment_alerts!==undefined)appointmentAlerts=data.mf_appointment_alerts;
  if(data.mf_work_schedules!==undefined)workSchedules=data.mf_work_schedules;
  if(data.mf_fields!==undefined)consultationFields=data.mf_fields;
  if(data.mf_doctor_fields!==undefined)doctorFields=data.mf_doctor_fields;
  if(data.mf_field_templates!==undefined)fieldTemplates=data.mf_field_templates;
  if(data.mf_settings_collapsed!==undefined)settingsCollapsed=data.mf_settings_collapsed;
  if(data.mf_delete_keyword!==undefined)deleteKeyword=data.mf_delete_keyword;
  if(typeof patientNotes!=='undefined'&&data.mf_patient_notes!==undefined)patientNotes=data.mf_patient_notes;
  if(typeof draftConsultations!=='undefined'&&data.mf_draft_consultations!==undefined)draftConsultations=data.mf_draft_consultations;
  MF_KEYS.forEach(k=>{if(data[k]!==undefined){try{localStorage.setItem(k,JSON.stringify(data[k]))}catch(e){}}});
  if(!Array.isArray(specialists)||!specialists.length)specialists=[...DEFAULT_SPECIALISTS];
  if(!Array.isArray(doctors))doctors=[]; if(!Array.isArray(patients))patients=[]; if(!Array.isArray(consultations))consultations=[]; if(!Array.isArray(deleteRequests))deleteRequests=[]; if(!Array.isArray(appointments))appointments=[]; if(!Array.isArray(appointmentAlerts))appointmentAlerts=[];
  workSchedules=workSchedules||{}; consultationFields=Array.isArray(consultationFields)&&consultationFields.length?consultationFields:cloneFields(DEFAULT_FIELDS); doctorFields=doctorFields||{}; fieldTemplates=fieldTemplates||{}; settingsCollapsed=settingsCollapsed||{}; deleteKeyword=deleteKeyword||'ВИДАЛИТИ';
  window.MED_APPLYING_CLOUD=false;
}
window.medSaveToCloud=function(k,v){if(!mfCloudReady||!state.authUser)return;mfDb.ref(`${MF_SHARED_PATH}/${k}`).set(v).catch(e=>console.warn('Firebase save error',k,e))}
async function mfEnsureSharedData(){
  const ref=mfDb.ref(MF_SHARED_PATH); const snap=await ref.get();
  if(!snap.exists()){
    await ref.set(mfLocalSnapshot());
  } else {
    const data=snap.val()||{};
    const local=mfLocalSnapshot();
    const updates={};
    MF_KEYS.forEach(k=>{if(data[k]===undefined&&local[k]!==undefined)updates[k]=local[k]});
    if(Object.keys(updates).length)await ref.update(updates);
    mfApplyCloudData({...local,...data});
  }
}
async function mfEnsureUserProfile(user){
  const profilesRef=mfDb.ref(MF_PROFILES_PATH); const allSnap=await profilesRef.get(); const all=allSnap.val()||{};
  const ref=profilesRef.child(user.uid); let p=(await ref.get()).val();
  if(!p){
    const first=Object.keys(all).length===0;
    let role=first?'admin':'doctor', spec=first?'Адміністратор':'Терапевт';
    let doctorId=user.uid;
    let name=user.displayName||user.email?.split('@')[0]||'Користувач';
    if(!doctors.some(d=>String(d.id)===String(doctorId))){
      doctors.push({id:doctorId,login:user.email,password:'',email:user.email,name,spec,role,extra:'',authUid:user.uid});
      save('mf_doctors',doctors);
    }
    p={uid:user.uid,email:user.email,name,doctorId,role,createdAt:new Date().toISOString()};
    await ref.set(p);
  }
  let doc=doctors.find(d=>String(d.id)===String(p.doctorId));
  if(!doc){
    doc={id:p.doctorId||user.uid,login:user.email,password:'',email:user.email,name:p.name||user.displayName||user.email,spec:p.role==='admin'?'Адміністратор':'Терапевт',role:p.role||'doctor',extra:'',authUid:user.uid};
    doctors.push(doc); save('mf_doctors',doctors);
  }
  if(p.role&&doc.role!==p.role){doc.role=p.role;doctors=doctors.map(d=>String(d.id)===String(doc.id)?doc:d);save('mf_doctors',doctors)}
  state.doctor=doc; state.authUser=user; state.loginError='';
}
function mfDetachShared(){if(mfSharedRef&&mfSharedHandler){mfSharedRef.off('value',mfSharedHandler)}mfSharedRef=null;mfSharedHandler=null;mfCloudReady=false;}
async function mfStartAppForUser(user){
  state.authUser=user; state.authVerify=false; state.authReady=false; r();
  await mfEnsureSharedData();
  await mfEnsureUserProfile(user);
  mfCloudReady=true;
  mfSharedRef=mfDb.ref(MF_SHARED_PATH); mfSharedHandler=s=>{mfApplyCloudData(s.val()||{}); if(state.doctor){let fresh=doctors.find(d=>String(d.id)===String(state.doctor.id)); if(fresh)state.doctor=fresh;} r();};
  mfSharedRef.on('value',mfSharedHandler,e=>alert(mfAuthError(e)));
  state.authReady=true; r();
}
async function firebaseLogin(){state.loginError='';try{let remember=document.getElementById('rememberMe')?.checked;await mfAuth.setPersistence(remember?firebase.auth.Auth.Persistence.LOCAL:firebase.auth.Auth.Persistence.SESSION);await mfAuth.signInWithEmailAndPassword(document.getElementById('loginEmail').value.trim(),document.getElementById('loginPassword').value)}catch(e){state.loginError=mfAuthError(e);r()}}

async function firebaseGoogleLogin(){state.loginError='';let remember=document.getElementById('rememberMe')?.checked;let provider=new firebase.auth.GoogleAuthProvider();provider.setCustomParameters({prompt:'select_account'});try{await mfAuth.setPersistence(remember?firebase.auth.Auth.Persistence.LOCAL:firebase.auth.Auth.Persistence.SESSION);await mfAuth.signInWithPopup(provider)}catch(e){if((e?.code||'').includes('popup')){try{await mfAuth.signInWithRedirect(provider)}catch(er){state.loginError=mfAuthError(er);r()}}else{state.loginError=mfAuthError(e);r()}}}
async function firebaseResetPassword(){let email=(document.getElementById('loginEmail')?.value||document.getElementById('regEmail')?.value||'').trim();if(!email){state.loginError='Введіть email у полі входу або реєстрації.';r();return}try{await mfAuth.sendPasswordResetEmail(email);state.loginError='Лист для відновлення пароля надіслано.';r()}catch(e){state.loginError=mfAuthError(e);r()}}
async function firebaseResendVerification(){try{await mfAuth.currentUser?.sendEmailVerification();alert('Лист підтвердження надіслано ще раз.')}catch(e){alert(mfAuthError(e))}}
async function firebaseReloadAfterVerify(){try{await mfAuth.currentUser.reload();if(mfAuth.currentUser.emailVerified){state.authVerify=false;await mfStartAppForUser(mfAuth.currentUser)}else alert('Email ще не підтверджений. Перевірте пошту або папку Спам.')}catch(e){alert(mfAuthError(e))}}
async function logout(){mfDetachShared();state.doctor=null;state.authUser=null;state.page='cabinet';await mfAuth.signOut();state.authReady=true;r()}
mfAuth.onAuthStateChanged(async user=>{mfDetachShared();if(!user){state.authReady=true;state.authVerify=false;state.doctor=null;r();return}if(!user.emailVerified){state.authReady=true;state.authVerify=true;state.authUser=user;state.doctor=null;r();return}try{await mfStartAppForUser(user)}catch(e){state.authReady=true;state.doctor=null;state.loginError=mfAuthError(e);r()}});

function esc(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;")}
function uid(){return Date.now()+Math.floor(Math.random()*1000)}
function initials(n){return (n||"?").split(" ").filter(Boolean).slice(0,2).map(w=>w[0]||"").join("").toUpperCase()||"?"}
function fmtDob(d){if(!d)return"—";let [y,m,dd]=d.split("-");return `${dd}.${m}.${y}`}
function onlyDigits(s){return String(s||"").replace(/\D/g,"")}
function normPhone(s){let d=onlyDigits(s);if(!d)return"";if(d.length===10&&d[0]==="0")d="38"+d;if(d.length===12&&d.startsWith("380"))return "+"+d;if(d.length===11&&d.startsWith("80"))return "+3"+d;if(d.length===9)return "+380"+d;return s}
function fmtPhone(s){let d=onlyDigits(s);if(!d)return"";if(d.length===10&&d[0]==="0")d="38"+d;if(d.length===12&&d.startsWith("380")){return `+38 (${d.slice(2,5)}) ${d.slice(5,8)} ${d.slice(8,10)} ${d.slice(10,12)}`}if(d.length===11&&d.startsWith("80")){d="3"+d;return `+38 (${d.slice(2,5)}) ${d.slice(5,8)} ${d.slice(8,10)} ${d.slice(10,12)}`}return String(s||"")}
function today(){return new Date().toLocaleDateString("uk-UA",{day:"2-digit",month:"2-digit",year:"numeric"})}
function isoToday(){return new Date().toISOString().slice(0,10)}
function age(d){if(!d)return"";let b=new Date(d),n=new Date();let a=n.getFullYear()-b.getFullYear();if(n.getMonth()<b.getMonth()||(n.getMonth()===b.getMonth()&&n.getDate()<b.getDate()))a--;return a+" р."}
function activeFields(){return getDoctorFields(state.doctor?.id).filter(f=>f.active!==false)}

function pendingDeleteRequests(){return deleteRequests.filter(r=>r.status==="pending").sort((a,b)=>String(b.createdAt).localeCompare(String(a.createdAt)))}

function requestTargetName(req){if(req.type==="patient"){let p=patients.find(x=>String(x.id)===String(req.id));return p?`Пацієнт: ${p.name}`:`Пацієнт ID ${req.id}`} if(req.type==="consult"){let c=consultations.find(x=>String(x.id)===String(req.id));return c?`Консультація: ${c.patientName}, ${fmtDob(c.date)}, ${c.doctorName}`:`Консультація ID ${req.id}`} if(req.type==="doctor"){let d=doctors.find(x=>String(x.id)===String(req.id));return d?`Лікар: ${d.name}`:`Лікар ID ${req.id}`} return `${req.type} ID ${req.id}`}
function filteredPatients(q=state.patSearch){q=(q||"").toLowerCase();let arr=patients.filter(p=>p.name.toLowerCase().includes(q)||String(p.phone||"").includes(q)||fmtPhone(p.phone).includes(q));let srt=state.patSort||"name_asc";arr.sort((a,b)=>{if(srt==="name_desc")return b.name.localeCompare(a.name,"uk");if(srt==="dob_new")return String(b.dob||"").localeCompare(String(a.dob||""));if(srt==="dob_old")return String(a.dob||"").localeCompare(String(b.dob||""));if(srt==="consults_desc")return patientAllConsultsCount(b.id)-patientAllConsultsCount(a.id);if(srt==="consults_asc")return patientAllConsultsCount(a.id)-patientAllConsultsCount(b.id);return a.name.localeCompare(b.name,"uk")});return arr}

function autoGrowTextarea(el){
  if(!el || el.tagName!=="TEXTAREA")return;
  const cs=window.getComputedStyle(el);
  const lh=parseFloat(cs.lineHeight)||21;
  const minRows=2.5;
  el.style.height="auto";
  const minH=Math.ceil(lh*minRows)+22;
  // scrollHeight показує фактичний текст, додаємо приблизно один рядок запасу, щоб поле не було впритик.
  el.style.height=Math.max(minH, el.scrollHeight+lh)+"px";
}

function defaultDaySchedule(){return {enabled:true,start:"09:00",end:"13:00",slot:30}}
function getDoctorSchedule(doctorId){
  doctorId=String(doctorId);
  if(!workSchedules[doctorId]){
    workSchedules[doctorId]={0:{enabled:false,start:"09:00",end:"13:00",slot:30},1:defaultDaySchedule(),2:defaultDaySchedule(),3:defaultDaySchedule(),4:defaultDaySchedule(),5:defaultDaySchedule(),6:{enabled:false,start:"09:00",end:"13:00",slot:30}};
  }
  return workSchedules[doctorId];
}
function timeToMin(t){let [h,m]=String(t||"00:00").split(":").map(Number);return (h||0)*60+(m||0)}
function minToTime(n){let h=Math.floor(n/60),m=n%60;return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")}
function dayIndexFromIso(date){return new Date(date+"T12:00:00").getDay()}
function dayNameByIndex(i){return ["Неділя","Понеділок","Вівторок","Середа","Четвер","П’ятниця","Субота"][Number(i)]||""}
function getDayConfig(doctorId,date){return getDoctorSchedule(doctorId)[dayIndexFromIso(date)]||{enabled:false,start:"09:00",end:"13:00",slot:30}}
function buildSlots(doctorId,date){let cfg=getDayConfig(doctorId,date);if(!cfg.enabled)return[];let start=timeToMin(cfg.start),end=timeToMin(cfg.end),step=Number(cfg.slot)||30;let out=[];for(let t=start;t<end;t+=step){out.push({time:minToTime(t),end:minToTime(Math.min(t+step,end))})}return out}
function apptForSlot(doctorId,date,time){return appointments.find(a=>String(a.doctorId)===String(doctorId)&&a.date===date&&a.time===time)}

function localDateIso(d){let x=new Date(d);x.setHours(12,0,0,0);return x.toISOString().slice(0,10)}
function dateAddIso(iso,days){let d=new Date(iso+"T12:00:00");d.setDate(d.getDate()+days);return localDateIso(d)}
function weekStartMonday(iso){let d=new Date((iso||isoToday())+"T12:00:00");let day=d.getDay();let diff=(day===0?-6:1-day);d.setDate(d.getDate()+diff);return localDateIso(d)}
function weekDates(iso){let start=weekStartMonday(iso);return [0,1,2,3,4,5,6].map(i=>dateAddIso(start,i))}
function dayShort(iso){return ["Нд","Пн","Вт","Ср","Чт","Пт","Сб"][new Date(iso+"T12:00:00").getDay()]}
function managerSummaryForDay(doctorId,date){let slots=buildSlots(doctorId,date);if(!slots.length)return {off:true,free:0,total:0,booked:0};let booked=slots.filter(sl=>!!apptForSlot(doctorId,date,sl.time)).length;return {off:false,free:slots.length-booked,total:slots.length,booked};}
function pendingAppointmentAlerts(){return appointmentAlerts.filter(a=>a.status==="new").sort((a,b)=>String(b.createdAt).localeCompare(String(a.createdAt)))}
function consultationDisplayName(doc){return (doc?.consultTitle||doc?.consultName||doc?.spec||"лікаря").trim()}
function appointmentStatusText(a){if(!a?.status)return ""; if(a.status==="done")return "Виконано"; if(a.status==="cancelled")return "Скасовано"; return "";}

function settingKey(title){return `u${state.doctor?.id||0}_${String(title||'').trim()}`}
function isSettingCollapsed(title){return !!settingsCollapsed[settingKey(title)]}
function toggleSetting(title){let k=settingKey(title);settingsCollapsed[k]=!settingsCollapsed[k];save("mf_settings_collapsed",settingsCollapsed);r()}
function enhanceSettingsToggles(){
  if(state.page!=="settings")return;
  document.querySelectorAll(".main-content > .card").forEach(card=>{
    let title=card.querySelector(":scope > .card-title");
    if(!title||card.dataset.toggleReady)return;
    let t=title.textContent.trim();
    let head=document.createElement("div");head.className="setting-head";
    let btn=document.createElement("button");btn.type="button";btn.className="setting-toggle";btn.textContent=isSettingCollapsed(t)?"Розгорнути":"Згорнути";
    title.parentNode.insertBefore(head,title);head.appendChild(title);head.appendChild(btn);
    let body=document.createElement("div");body.className="setting-body"+(isSettingCollapsed(t)?" collapsed":"");
    while(head.nextSibling)body.appendChild(head.nextSibling);
    card.appendChild(body);
    head.addEventListener("click",e=>{if(e.target.closest("button")||e.target===head||e.target.closest(".card-title")){toggleSetting(t)}});
    card.dataset.toggleReady="1";
  });
}
function isPastSlot(date,endTime){let end=new Date(date+"T"+endTime+":00");return end.getTime()<Date.now()}
function hasConsultationForAppointment(a){return !!a && consultations.some(c=>String(c.patientId)===String(a.patientId)&&String(c.doctorId)===String(a.doctorId)&&c.date===a.date)}
function reconcileDoneStatuses(){
  let changed=false;
  appointments=appointments.map(a=>{
    if(a.status==="done"&&!hasConsultationForAppointment(a)){changed=true;return {...a,status:"scheduled",doneRemovedAt:new Date().toISOString(),doneRemovedReason:"consultation_deleted"}}
    return a;
  });
  if(changed)save("mf_appointments",appointments);
  return changed;
}
function appointmentsNeedDone(doctorId,date){return appointments.filter(a=>String(a.doctorId)===String(doctorId)&&a.date===date&&a.status!=="done"&&a.status!=="cancelled"&&hasConsultationForAppointment(a)).sort((a,b)=>String(a.time).localeCompare(String(b.time)))}
function nextAppointmentIdForDay(doctorId,date){let now=new Date();return appointments.filter(a=>String(a.doctorId)===String(doctorId)&&a.date===date&&a.status!=="done"&&a.status!=="cancelled").sort((a,b)=>String(a.time).localeCompare(String(b.time))).find(a=>new Date(date+"T"+a.time+":00")>=now)?.id||null}
function dateRangeForStats(){let today=isoToday();if(state.statsMode==="month"){let d=new Date(today+"T12:00:00");return {from:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`,to:today}}if(state.statsMode==="period"){return {from:state.statsFrom||today,to:state.statsTo||today}}let start=weekStartMonday(today);return {from:start,to:dateAddIso(start,6)}}
function completedCountForDoctor(doctorId,from,to){return appointments.filter(a=>String(a.doctorId)===String(doctorId)&&a.status==="done"&&a.date>=from&&a.date<=to).length}

function patientShortName(p){if(!p)return"Пацієнт не знайдений";let parts=String(p.name||"").trim().split(/\s+/);if(parts.length>=3)return `${parts[0]} ${parts[1][0]||""}. ${parts[2][0]||""}.`;if(parts.length>=2)return `${parts[0]} ${parts[1][0]||""}.`;return p.name}
function cabinetPage(){
  let isMgr=canManageSchedule();

  state.cabinetDoctorId=did;
  let date=state.cabinetDate||isoToday();
  let doc=doctorById(did)||state.doctor;
  let slots=buildSlots(did,date);

  return `<div class="page-header"><div class="page-title">Кабінет</div><div class="page-sub">Записи на день · ${esc(doc.name)} · ${fmtDob(date)}</div></div>
  ${isMgr&&alerts.length?`<section class="card"><div class="card-title">Сповіщення для менеджера</div>${alerts.map(a=>`<div class="notice-box">⚠ ${esc(a.doctorName||"")} скасував запис: ${esc(a.patientName||"")} · ${fmtDob(a.date)} ${esc(a.time||"")}<div class="actions" style="margin-top:8px"><button class="btn btn-secondary btn-small" data-alert-seen="${a.id}">Позначити переглянутим</button></div></div>`).join("")}</section>`:""}
  ${!isMgr&&needDone.length?`<section class="card"><div class="card-title">Потрібно відмітити виконання</div>${needDone.map(a=>{let p=patients.find(x=>String(x.id)===String(a.patientId));return `<div class="notice-box">ℹ️ Консультація збережена, але запис ще не позначений як <b>Виконано</b>: ${esc(patientShortName(p))} · ${esc(a.time||"")}<div class="actions" style="margin-top:8px"><button class="btn btn-green btn-small" data-appt-done="${a.id}">Позначити виконано</button></div></div>`}).join("")}</section>`:""}
  <section class="card"><div class="actions" style="justify-content:space-between;align-items:flex-end"><div class="grid3" style="flex:1;max-width:${isMgr?'760px':'520px'}"><div><div class="field-label">Дата</div><input id="cabinetDate" type="date" value="${esc(date)}"></div>${isMgr?`<div><div class="field-label">Лікар</div><select id="cabinetDoctor">${docs.map(d=>`<option value="${d.id}" ${String(d.id)===String(did)?"selected":""}>${esc(d.name)} — ${esc(d.spec)}</option>`).join("")}</select></div>`:""}<div><div class="field-label">Робочий час</div><div class="muted" style="padding:10px 0;font-size:13px">${cfg.enabled?`${cfg.start}–${cfg.end}, слот ${cfg.slot||30} хв`:"Вихідний"}</div></div></div>${isMgr?`<button class="btn btn-secondary" id="btnGoScheduleSettings">Налаштувати графік</button>`:""}</div><div class="week-tabs">${wdates.map(d=>`<button class="week-tab ${d===date?"active":""} ${d===isoToday()?"today":""}" data-cabinet-day="${d}">${dayShort(d)}<span class="week-tab-date">${fmtDob(d).slice(0,5)}</span></button>`).join("")}</div>${managerSummary}</section>
  <section class="card"><div class="card-title">Записи</div>${!slots.length?`<div class="empty">На цей день робочий час не заданий або вихідний.</div>`:`<div class="schedule-grid">${(()=>{let nextId=nextAppointmentIdForDay(did,date);return slots.map(sl=>{let a=apptForSlot(did,date,sl.time),p=a?patients.find(x=>String(x.id)===String(a.patientId)):null, st=a?.status||"", past=isSlotClosedForBooking(date,sl.time), doneAllowed=hasConsultationForAppointment(a);return `<div class="schedule-slot ${a?'booked':'free'} ${st} ${past?'past':''} ${a&&String(a.id)===String(nextId)?'next':''}" data-appt-slot="${sl.time}" data-appt-doctor="${did}" data-appt-date="${date}" data-slot-past="${past?'1':'0'}"><div class="schedule-time">${sl.time} - ${sl.end}</div>${a?`<div class="schedule-patient">${esc(patientShortName(p))} ${st?`<span class="status-pill ${st}">${appointmentStatusText(a)}</span>`:""}<div class="schedule-note">${esc(a.note||'')}</div></div><button class="btn btn-secondary btn-small" data-open-patient="${a.patientId}">Картка</button>${(!isMgr&&String(did)===String(state.doctor.id))?`<button class="btn btn-green btn-small" data-appt-done="${a.id}" ${(doneAllowed||st==='done')?'':'disabled title="Спочатку збережіть консультацію цього пацієнта"'}>${st==='done'?'Зняти виконано':'Виконано'}</button>${(!doneAllowed&&st!=='done')?`<span class="disabled-note">немає консультації</span>`:""}<button class="btn btn-danger btn-small" data-appt-cancel="${a.id}">Скасовано</button>`:""}`:`<div class="schedule-free">Вільно</div>`}${isMgr?`${past&&!a?`<span class="muted" style="font-size:12px">минулий час</span>`:`<button class="btn btn-secondary btn-small" data-edit-appt="${a?a.id:''}" data-appt-slot="${sl.time}" data-appt-doctor="${did}" data-appt-date="${date}" ${past&&!a?'disabled':''}>${a?'Змінити':'Записати'}</button>`}`:""}</div>`}).join("")})()}</div>`}</section>`
}
function scheduleSettings(){
  if(!canManageSchedule())return"";
  let docs=doctorsForSchedule();
  let did=String(state.scheduleDoctorId||state.cabinetDoctorId||docs[0]?.id||"");
  if(!docs.some(d=>String(d.id)===did))did=String(docs[0]?.id||"");
  state.scheduleDoctorId=did;
  let sch=getDoctorSchedule(did);
  return `<section class="card"><div class="card-title">Графік роботи лікарів</div><div class="muted" style="font-size:13px;margin-bottom:10px">Менеджер або адміністратор може гнучко задавати робочі години для кожного лікаря по днях.</div><div class="row" style="max-width:420px"><div class="field-label">Лікар</div><select id="scheduleDoctorSelect">${docs.map(d=>`<option value="${d.id}" ${String(d.id)===did?"selected":""}>${esc(d.name)} — ${esc(d.spec)}</option>`).join("")}</select></div><div class="weekday-row" style="font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:800"><div>День</div><div>Працює</div><div>Початок</div><div>Кінець</div><div>Слот, хв</div></div>${[1,2,3,4,5,6,0].map(i=>{let c=sch[i]||{enabled:false,start:"09:00",end:"13:00",slot:30};return `<div class="weekday-row"><div style="font-weight:700">${dayNameByIndex(i)}</div><label class="muted" style="display:flex;gap:6px;align-items:center"><input type="checkbox" data-sched-enabled="${i}" ${c.enabled?"checked":""}> так</label><input type="time" data-sched-start="${i}" value="${esc(c.start||'09:00')}"><input type="time" data-sched-end="${i}" value="${esc(c.end||'13:00')}"><select data-sched-slot="${i}"><option value="15" ${c.slot==15?"selected":""}>15</option><option value="20" ${c.slot==20?"selected":""}>20</option><option value="30" ${!c.slot||c.slot==30?"selected":""}>30</option><option value="45" ${c.slot==45?"selected":""}>45</option><option value="60" ${c.slot==60?"selected":""}>60</option></select></div>`}).join("")}<button class="btn btn-green" id="btnSaveSchedule" style="margin-top:12px">✓ Зберегти графік</button></section>`
}
function appointmentModal(){

  <div class="row"><div class="field-label">Пацієнт з бази</div><select id="apptPatient"><option value="">Вільно / без пацієнта</option>${patients.slice().sort((a,b)=>a.name.localeCompare(b.name,'uk')).map(p=>`<option value="${p.id}" ${String(p.id)===String(pval)?"selected":""}>${esc(p.name)} · ${fmtDob(p.dob)}</option>`).join("")}</select></div>

  <div class="row"><div class="field-label">Примітка</div><input id="apptNote" value="${esc(a?.note||'')}" placeholder="Наприклад: первинний огляд"></div><div class="modal-actions"><button class="btn btn-secondary" data-close-modal>Скасувати</button>${a?`<button class="btn btn-danger" id="btnMakeAppointmentFree">Зробити вільно</button><button class="btn btn-danger" id="btnDeleteAppointment">Видалити запис</button>`:""}<button class="btn btn-green" id="btnSaveAppointment">Зберегти</button></div></div></div>`
}
function formPage(){let sp=state.selectedPatient;let editC=currentEditConsultation();return `<div class="page-header"><div class="page-title">${editC?"Редагування консультації":"Нова консультація"}</div><div class="page-sub">${consultationTitle(state.doctor)} · ${today()}${editC?" · можна редагувати тільки в день створення":""}</div></div><section class="card"><div class="card-title">Пацієнт</div><div class="pos-rel"><div class="field-label">Пошук пацієнта в базі</div><input id="patientQuery" value="${esc(state.patientQuery)}" placeholder="Введіть прізвище або ім'я..." autocomplete="off">${state.showSuggest&&state.patientQuery?`<div class="suggest" id="suggestBox">${filteredSuggest().map(p=>`<div class="suggest-item" data-select-patient="${p.id}"><b>${esc(p.name)}</b><div class="muted">нар. ${fmtDob(p.dob)} · ${age(p.dob)}</div></div>`).join("")}<div class="suggest-add" id="btnAddPatientFromForm">+ Додати нового пацієнта «${esc(state.patientQuery)}»</div></div>`:""}</div>${sp?`<div class="selected-box"><div class="avatar avatar-lg">${initials(sp.name)}</div><div style="flex:1"><b>${esc(sp.name)}</b><div class="muted" style="font-size:12px">Дата народження: ${fmtDob(sp.dob)} · ${age(sp.dob)}</div>${sp.phone?`<div class="muted" style="font-size:12px">${esc(fmtPhone(sp.phone))}</div>`:""}</div><button class="btn btn-secondary btn-small" data-open-patient="${sp.id}">Картка</button><button class="btn btn-secondary btn-small" id="btnClearPatient">✕</button></div>`:""}</section><section class="card"><div class="card-title">Дані консультації</div>${activeFields().map(f=>`<div class="row"><div class="field-label">${esc(f.label)} ${f.required?'<span class="req">*</span>':""}</div>${f.templatesEnabled?`<div class="template-btn-row"><button class="btn btn-secondary btn-small" data-open-templates="${esc(f.id)}" type="button">📋 Шаблони</button><span class="template-hint">Вставляє шаблон у це поле, не видаляючи попередній текст.</span></div>`:""}<textarea id="field_${f.id}" rows="${f.rows||3}" data-form-field="${f.id}">${esc(getFormValue(f.id))}</textarea>${f.required&&!String(getFormValue(f.id)).trim()?`<div class="warn-badge">⚠ Обов'язкове поле</div>`:""}</div>`).join("")}</section><div class="actions" style="margin-bottom:2rem"><button class="btn btn-green" id="btnSavePrint">💾 ${editC?"Оновити і надрукувати":"Зберегти і надрукувати"}</button><button class="btn btn-secondary" id="btnSaveOnly">💾 ${editC?"Оновити":"Тільки зберегти"}</button><button class="btn btn-secondary" id="btnClearForm">↺ ${editC?"Скасувати редагування":"Очистити форму"}</button></div>`}
function patientsPage(){let list=filteredPatients();return `<div class="page-header"><div class="actions" style="justify-content:space-between"><div><div class="page-title">База пацієнтів</div><div class="page-sub">${patients.length} пацієнтів · консультацій: ${consultations.length}</div></div><button class="btn btn-green" id="btnAddPatientPage">+ Додати пацієнта</button></div></div><div class="search-wrap" style="flex-wrap:wrap"><span class="search-icon">🔍</span><input class="search-bar" id="patSearch" value="${esc(state.patSearch)}" placeholder="Пошук за іменем або телефоном..."><select id="patSort" style="max-width:230px"><option value="name_asc" ${state.patSort==="name_asc"?"selected":""}>ПІБ: А–Я</option><option value="name_desc" ${state.patSort==="name_desc"?"selected":""}>ПІБ: Я–А</option><option value="dob_new" ${state.patSort==="dob_new"?"selected":""}>Дата народження: новіші</option><option value="dob_old" ${state.patSort==="dob_old"?"selected":""}>Дата народження: старші</option><option value="consults_desc" ${state.patSort==="consults_desc"?"selected":""}>Більше консультацій</option><option value="consults_asc" ${state.patSort==="consults_asc"?"selected":""}>Менше консультацій</option></select></div><section class="card" style="padding:1rem"><div class="card-title">Пошук консультації за ID</div><div class="actions"><input id="consultIdSearch" value="${esc(state.consultIdSearch)}" placeholder="Введіть ID консультації" style="max-width:260px"><button class="btn btn-secondary" id="btnFindConsultById">Знайти</button></div>${state.consultSearchMsg?`<div class="muted" style="font-size:13px;margin-top:8px">${state.consultSearchMsg}</div>`:""}</section><div class="patients-grid">${list.length?list.map(p=>`<div class="patient-card"><div class="avatar">${initials(p.name)}</div><div class="patient-name">${esc(p.name)}</div><div class="patient-dob">нар. ${fmtDob(p.dob)} · ${age(p.dob)}</div>${p.phone?`<div class="patient-dob">${esc(fmtPhone(p.phone))}</div>`:""}<div class="patient-dob" style="margin-top:5px">Консультацій: <b>${patientConsults(p.id).length}</b>${!isAdmin()?` <span class="muted">/ всього ${patientAllConsultsCount(p.id)}</span>`:""}</div><div class="actions" style="margin-top:10px"><button class="btn btn-green btn-small" data-consult="${p.id}">📝 Нова</button><button class="btn btn-secondary btn-small" data-open-patient="${p.id}">Відкрити</button><button class="btn btn-danger btn-small" data-del-patient="${p.id}">✕</button></div></div>`).join(""):`<div class="empty">Пацієнтів не знайдено</div>`}</div>`}
function statsPage(){
  if(!(isManager()||isAdmin()))return `<div class="empty">Статистика доступна менеджеру та адміністратору.</div>`;
  let range=dateRangeForStats();
  let rows=doctorsForSchedule().map(d=>({doctor:d,count:completedCountForDoctor(d.id,range.from,range.to)}));
  let max=Math.max(1,...rows.map(r=>r.count));
  return `<div class="page-header"><div class="page-title">Статистика</div><div class="page-sub">Виконані записи лікарів · ${fmtDob(range.from)} — ${fmtDob(range.to)}</div></div>

function wrapTextLinesForPrint(text, maxChars=86){
  text=String(text||"").replace(/\r/g,"");
  const result=[];
  text.split("\n").forEach(raw=>{
    const line=String(raw||"").trimEnd();
    if(!line.trim()){result.push("");return;}
    let cur="";
    line.split(/\s+/).forEach(word=>{
      if(!cur){cur=word;return;}
      if((cur+" "+word).length>maxChars){result.push(cur);cur=word;}
      else cur+=" "+word;
    });
    if(cur)result.push(cur);
  });
  return result.length?result:[""];
}
function takePrintLines(text, maxLines, maxChars=86){
  const lines=wrapTextLinesForPrint(text,maxChars);
  const taken=lines.slice(0,Math.max(0,maxLines));
  const rest=lines.slice(Math.max(0,maxLines));
  return {taken:taken.join("\n"),rest:rest.join("\n"),lines:taken.length,hasRest:rest.length>0};
}
function makePrintPages(c){
  const fields=(c.fields||[]).filter(f=>String(f.value||"").trim());
  const pages=[];
  let page=[];
  let used=0;
  // Орієнтовна місткість сторінки в рядках. У v3_14 додано резерв для блоку лікаря/штампа на останній сторінці,
  // щоб штамп не заходив на нижній футер, але перші сторінки залишалися щільно заповненими.
  const firstPageLimit=40;
  const nextPageLimit=46;
  const finalSignReserve=7;
  const maxChars=86;
  function currentLimit(){return pages.length===0?firstPageLimit:nextPageLimit}
  function finish(){pages.push(page);page=[];used=0}
  function addChunk(label,value,isContinuation){
    const labelLines=1;
    const textLines=wrapTextLinesForPrint(value,maxChars).length;
    const marginLines=1;
    page.push({label,value,isContinuation:!!isContinuation});
    used+=labelLines+textLines+marginLines;
  }
  fields.forEach((f,fi)=>{
    let rest=String(f.value||"").trim();
    let part=0;
    while(rest.trim()){
      let limit=currentLimit();
      let available=limit-used;
      // Якщо залишилося хоча б кілька рядків, використовуємо їх для початку наступного поля,
      // а не переносимо весь блок на нову сторінку.
      if(page.length && available<2){finish();limit=currentLimit();available=limit-used;}
      const label=part===0?f.label:(f.label+" (продовження)");
      const restLines=wrapTextLinesForPrint(rest,maxChars).length;
      const baseCapacity=Math.max(1,available-2); // 1 рядок для назви + невеликий відступ
      const isFinalPieceCandidate=(fi===fields.length-1 && restLines<=baseCapacity);
      const textCapacity=Math.max(1,baseCapacity-(isFinalPieceCandidate?finalSignReserve:0));
      const picked=takePrintLines(rest,textCapacity,maxChars);
      addChunk(label,picked.taken,part>0);
      rest=picked.rest;
      part++;
      if(rest.trim())finish();
    }
  });
  if(page.length||!pages.length)pages.push(page);
  return pages;
}

function renderPrintField(f){

function login(){firebaseLogin()}
function selectPatient(id){
  let p=patients.find(x=>x.id===id);
  if(p){
    // Якщо була відкрита вже збережена консультація, вибір іншого пацієнта
    // не повинен перезаписувати стару консультацію.
    const editC=currentEditConsultation();
    if(editC && String(editC.patientId)!==String(p.id)){
      state.editingConsultationId=null;
      state.printConsultation=null;
    }
    state.selectedPatient=p;state.patientQuery=p.name;state.showSuggest=false;r()
  }
}
function startNewConsultationForPatient(patientId){
  const p=patients.find(x=>String(x.id)===String(patientId));
  if(!p)return;
  // "Нова консультація" завжди має відкривати чисту форму для вибраного пацієнта,
  // навіть якщо перед цим була збережена/редагована консультація іншого пацієнта.
  state.selectedPatient=p;
  state.patientQuery=p.name;
  state.showSuggest=false;
  state.form={};
  state.printConsultation=null;
  state.editingConsultationId=null;
  state.warnings=[];
  state.page="form";
  state.modal=null;
  r();
}
function clearForm(){state.selectedPatient=null;state.patientQuery="";state.form={};state.printConsultation=null;state.editingConsultationId=null;r()}

if(print)setTimeout(()=>window.print(),80);else alert((wasEdit?"✓ Консультацію оновлено":"✓ Консультацію збережено в картці пацієнта")+(related?"\n\nНе забудьте в Кабінеті натиснути кнопку «Виконано» для цього запису.":""))}

function performDelete(type,id){
  if(type==="patient"){
    patients=patients.filter(p=>String(p.id)!==String(id));
    consultations=consultations.filter(c=>String(c.patientId)!==String(id));
    appointments=appointments.map(a=>String(a.patientId)===String(id)&&a.status==="done"?{...a,status:"scheduled",doneRemovedAt:new Date().toISOString(),doneRemovedReason:"patient_deleted"}:a);
    if(String(state.selectedPatient?.id)===String(id)){state.selectedPatient=null;state.patientQuery=""}
    save("mf_patients",patients);save("mf_consultations",consultations);save("mf_appointments",appointments);
  }
  if(type==="consult"){
    consultations=consultations.filter(c=>String(c.id)!==String(id));
    save("mf_consultations",consultations);
    reconcileDoneStatuses();
  }
  if(type==="doctor"){doctors=doctors.filter(d=>String(d.id)!==String(id));save("mf_doctors",doctors)}

function cloneSchedule(s){return JSON.parse(JSON.stringify(s||{}));}
function weekKeyForDate(date){return weekStartMonday(date||isoToday());}
function getBaseWeekSchedule(doctorId){return cloneSchedule(getDoctorSchedule(doctorId));}
function getWeekSchedule(doctorId,weekStart){
  doctorId=String(doctorId); weekStart=weekStart||weekStartMonday(isoToday());
  if(!weeklyWorkSchedules[doctorId])weeklyWorkSchedules[doctorId]={};
  if(!weeklyWorkSchedules[doctorId][weekStart]){
    weeklyWorkSchedules[doctorId][weekStart]=getBaseWeekSchedule(doctorId);
    save('mf_weekly_work_schedules',weeklyWorkSchedules);
  }
  return weeklyWorkSchedules[doctorId][weekStart];
}
getDayConfig=function(doctorId,date){
  const ws=getWeekSchedule(doctorId,weekKeyForDate(date));
  return ws[dayIndexFromIso(date)]||{enabled:false,start:'09:00',end:'13:00',slot:30};
};

function isPastDate(iso){return String(iso)<isoToday();}
function isTodayDate(iso){return String(iso)===isoToday();}
function currentTimeHHMM(){let d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}

function movingAppointment(){return appointments.find(a=>String(a.id)===String(state.movingAppointmentId));}
function startMoveAppointment(id){state.movingAppointmentId=Number(id)||id;state.modal=null;r();}

function moveAppointmentHere(doctorId,date,time){
  let src=movingAppointment();
  if(!src){state.movingAppointmentId=null;r();return}
  let target=appointments.find(a=>String(a.doctorId)===String(doctorId)&&a.date===date&&a.time===time);
  if(target){alert('Цей слот уже зайнятий. Оберіть вільний час.');return}
  let slots=buildSlots(doctorId,date), sl=slots.find(x=>x.time===time);
  if(!sl||!moveAllowedForSlot(date,sl.end)){alert('Не можна перенести запис на минулий час.');return}
  appointments=appointments.map(a=>String(a.id)===String(src.id)?{...a,doctorId:String(doctorId),date,time,status:a.status==='done'?'scheduled':a.status,updatedAt:new Date().toISOString(),updatedBy:state.doctor.name,movedAt:new Date().toISOString(),movedFrom:{doctorId:src.doctorId,date:src.date,time:src.time}}:a);

function saveAppointmentAlerts(){save('mf_appointment_alerts',appointmentAlerts)}
function consultHasLinkedAppointment(c){return appointments.some(a=>consultationMatchesAppointment(c,a));}
function appointmentHasAnyConsultation(a){return consultations.some(c=>consultationMatchesAppointment(c,a));}
function candidateAppointmentsForConsult(c){
  return appointments.filter(a=>String(a.patientId)===String(c.patientId)&&String(a.doctorId)===String(c.doctorId)&&a.status!=='cancelled'&&a.status!=='no_show'&&!appointmentHasAnyConsultation(a)).sort((a,b)=>String(a.date+a.time).localeCompare(String(b.date+b.time)));
}
function ensureConsultationLinkWorkflow(c){
  if(!c||state.editingConsultationId)return '';
  // 1) exact/time-window link is automatic
  let exact=appointments.find(a=>consultationMatchesAppointment(c,a));
  if(exact){
    if(!c.appointmentId){consultations=consultations.map(x=>String(x.id)===String(c.id)?{...x,appointmentId:exact.id,linkedAt:new Date().toISOString(),linkMode:'auto'}:x);save('mf_consultations',consultations)}
    return 'Консультацію автоматично прив’язано до запису.';
  }
  // 2) if the patient has any free/unlinked appointment for this doctor, manager must choose/confirm link
  let candidates=candidateAppointmentsForConsult(c);
  let already=appointmentAlerts.some(a=>a.status==='new'&&a.type==='link_request'&&String(a.consultationId)===String(c.id));
  if(candidates.length&&!already){
    let first=candidates[0];
    appointmentAlerts.push({id:uid(),type:'link_request',status:'new',consultationId:c.id,patientId:c.patientId,patientName:c.patientName,doctorId:c.doctorId,doctorName:c.doctorName,date:first.date,time:first.time,createdAt:new Date().toISOString(),message:'Є запис без прив’язаної консультації. Потрібно підтвердити прив’язку.'});
    saveAppointmentAlerts();
    return 'Є запис без консультації. Менеджеру відправлено запит на прив’язку.';
  }
  // 3) if no appointment exists, manager must create appointment and link
  let alreadyCreate=appointmentAlerts.some(a=>a.status==='new'&&a.type==='create_appointment_for_consult'&&String(a.consultationId)===String(c.id));
  if(!alreadyCreate){
    appointmentAlerts.push({id:uid(),type:'create_appointment_for_consult',status:'new',consultationId:c.id,patientId:c.patientId,patientName:c.patientName,doctorId:c.doctorId,doctorName:c.doctorName,createdAt:new Date().toISOString(),message:'Консультація збережена без запису. Потрібно створити запис і прив’язати консультацію.'});
    saveAppointmentAlerts();
  }
  return 'Запису для консультації немає. Менеджеру відправлено запит створити запис і прив’язати консультацію.';
}

};

/* === Firebase Auth approval workflow patch ===
   - First confirmed user becomes approved admin.
   - Next users are pending until admin approves them.
   - Names/roles are read from Firebase Database, not overwritten from Google on every login.
   - Data source of truth is Firebase Database; startup demo data was removed.
*/
let mfProfilesRef=null,mfProfilesHandler=null;
state.pendingApproval=false;
state.pendingProfile=null;
state.authProfiles={};

function mfDefaultSharedData(){
  return {
    mf_specialists:[...DEFAULT_SPECIALISTS],

    mf_patients:[],

    mf_delete_requests:[],

    mf_patient_notes:{},
    mf_draft_consultations:[],

}
function mfClearLocalCache(){
  const keys=[...MF_KEYS,'mf_patient_events','mf_weekly_work_schedules','mf_side_delete_enabled','mf_viewed_consult_datetime'];
  keys.forEach(k=>{try{localStorage.removeItem(k)}catch(e){}});
}
function mfDetachProfiles(){if(mfProfilesRef&&mfProfilesHandler){mfProfilesRef.off('value',mfProfilesHandler)}mfProfilesRef=null;mfProfilesHandler=null;}
const __mfOldDetachSharedApproval=mfDetachShared;
mfDetachShared=function(){try{__mfOldDetachSharedApproval()}catch(e){}; mfDetachProfiles(); mfCloudReady=false;}

async function mfEnsureSharedData(){
  const ref=mfDb.ref(MF_SHARED_PATH);
  const snap=await ref.get();
  if(!snap.exists()){
    const base=mfDefaultSharedData();
    // Якщо перший адмін уже створився перед ініціалізацією shared-гілки, зберігаємо його.
    if(Array.isArray(doctors)&&doctors.length)base.mf_doctors=doctors;
    await ref.set(base);
    mfApplyCloudData(base);
  }else{
    const data=snap.val()||{};
    const base=mfDefaultSharedData();
    const updates={};
    Object.keys(base).forEach(k=>{if(data[k]===undefined)updates[k]=base[k]});
    if(Object.keys(updates).length)await ref.update(updates);
    mfApplyCloudData({...base,...data,...updates});
  }
}

async function mfEnsureUserProfile(user){
  const profilesRef=mfDb.ref(MF_PROFILES_PATH);
  const allSnap=await profilesRef.get();
  const all=allSnap.val()||{};
  const ref=profilesRef.child(user.uid);
  let p=(await ref.get()).val();
  if(!p){
    const first=Object.keys(all).length===0;
    const name=(user.displayName||user.email?.split('@')[0]||'Користувач').trim();
    p={
      uid:user.uid,
      email:user.email||'',
      name,
      doctorId:first?user.uid:null,
      role:first?'admin':'doctor',
      status:first?'approved':'pending',
      createdAt:new Date().toISOString(),
      provider:(user.providerData||[]).map(x=>x.providerId).join(',')
    };
    await ref.set(p);
  }
  state.pendingApproval=p.status!=='approved';
  state.pendingProfile=p;
  state.authProfiles={...all,[user.uid]:p};
  if(state.pendingApproval){
    state.doctor=null;
    state.authUser=user;
    state.loginError='';
    return p;
  }
  let doc=doctors.find(d=>String(d.authUid||'')===String(user.uid)) || doctors.find(d=>String(d.id)===String(p.doctorId));
  if(!doc){
    doc={
      id:p.doctorId||user.uid,
      login:p.email||user.email||'',
      password:'',
      email:p.email||user.email||'',
      name:p.name||user.email||'Користувач',
      spec:p.role==='admin'?'Адміністратор':(p.role==='manager'?'Менеджер':'Терапевт'),
      role:p.role||'doctor',
      extra:'',
      authUid:user.uid,
      approvedAt:p.approvedAt||new Date().toISOString()
    };
    doctors.push(doc);
    save('mf_doctors',doctors);
    await ref.update({doctorId:doc.id});
  }else{
    let changed=false;
    // Імʼя беремо з бази/картки лікаря, а не перезаписуємо з Google.
    if(p.name&&doc.name!==p.name){doc={...doc,name:p.name};changed=true;}
    if(p.role&&doc.role!==p.role){doc={...doc,role:p.role,spec:p.role==='admin'?'Адміністратор':(p.role==='manager'?'Менеджер':doc.spec)};changed=true;}
    if(!doc.authUid){doc={...doc,authUid:user.uid};changed=true;}
    if(!doc.email){doc={...doc,email:p.email||user.email||''};changed=true;}
    if(changed){doctors=doctors.map(d=>String(d.id)===String(doc.id)?doc:d);save('mf_doctors',doctors);}
  }
  state.doctor=doc;
  state.authUser=user;
  state.loginError='';
  return p;
}

async function mfStartAppForUser(user){
  state.authUser=user; state.authVerify=false; state.authReady=false; state.pendingApproval=false; r();
  await mfEnsureUserProfile(user);
  if(state.pendingApproval){state.authReady=true; r(); return;}
  await mfEnsureSharedData();
  // Після завантаження shared-даних ще раз підтягуємо лікаря вже з хмари.
  await mfEnsureUserProfile(user);
  mfCloudReady=true;
  mfSharedRef=mfDb.ref(MF_SHARED_PATH);
  mfSharedHandler=s=>{mfApplyCloudData(s.val()||{}); if(state.doctor){let fresh=doctors.find(d=>String(d.id)===String(state.doctor.id)); if(fresh)state.doctor=fresh;} r();};
  mfSharedRef.on('value',mfSharedHandler,e=>alert(mfAuthError(e)));
  if(isAdmin()){
    mfProfilesRef=mfDb.ref(MF_PROFILES_PATH);
    mfProfilesHandler=s=>{state.authProfiles=s.val()||{}; r();};
    mfProfilesRef.on('value',mfProfilesHandler,e=>console.warn(e));
  }
  state.authReady=true; r();
}

  else{doc={...doc,email:p.email||doc.email,login:p.email||doc.login,name:doc.name||p.name||p.email,role:cleanRole,spec:cleanRole==='admin'?'Адміністратор':(cleanRole==='manager'?'Менеджер':doc.spec||'Терапевт'),authUid:uid};doctors=doctors.map(d=>String(d.id)===String(doc.id)?doc:d)}

  return `<div class="modal-bg"><div class="modal-box"><div class="modal-title">${isEdit?'Редагування лікаря':'Новий лікар'}</div><div class="grid2"><div><div class="field-label">ПІБ <span class="req">*</span></div><input id="docName" value="${esc(d.name||'')}"></div><div><div class="field-label">Email / логін</div><input id="docLogin" value="${esc(d.email||d.login||'')}" ${d.authUid?'disabled':''}></div></div><div class="grid2" style="margin-top:12px"><div><div class="field-label">Пароль</div><input disabled value="Пароль змінюється користувачем через Firebase"><div class="muted" style="font-size:11px;margin-top:4px">Адмін не бачить і не змінює пароль користувача.</div></div><div><div class="field-label">Роль</div>${roleSelect}</div></div><div class="grid2" style="margin-top:12px"><div><div class="field-label">Спеціальність</div><select id="docSpec">${specialists.map(s=>`<option ${d.spec===s?'selected':''}>${s}</option>`).join('')}</select></div><div><div class="field-label">Для консультації</div><input id="docConsultTitle" value="${esc(d.consultTitle||'')}" placeholder="напр. дитячого невролога"></div></div><div style="margin-top:12px"><div class="field-label">Кваліфікація / примітка</div><input id="docExtra" value="${esc(d.extra||'')}"></div><div id="docErr" class="error-msg" style="display:none">Заповніть обов'язкові поля</div><div class="modal-actions"><button class="btn btn-secondary" data-close-modal>Скасувати</button><button class="btn btn-green" id="btnSaveDoctor">Зберегти</button></div></div></div>`;
};

saveDoctor=function(){
  let name=document.getElementById('docName').value.trim(),login=document.getElementById('docLogin').value.trim(),role=document.getElementById('docRole').value,spec=document.getElementById('docSpec').value,extra=document.getElementById('docExtra').value.trim(),consultTitle=document.getElementById('docConsultTitle')?.value.trim()||'';
  if(!name){document.getElementById('docErr').style.display='block';return}
  if(!isAdmin()&&state.editDoctor){role=state.editDoctor.role||'doctor'}
  if(state.editDoctor){
    const old=state.editDoctor;
    const updated={...old,name,login:old.authUid?(old.email||old.login):login,email:old.email||login,password:'',role,spec:role==='admin'?'Адміністратор':(role==='manager'?'Менеджер':spec),extra,consultTitle};
    doctors=doctors.map(d=>String(d.id)===String(old.id)?updated:d);
    if(updated.authUid){mfDb.ref(`${MF_PROFILES_PATH}/${updated.authUid}`).update({name:updated.name,role:updated.role,doctorId:updated.id,status:'approved',email:updated.email||''}).catch(e=>console.warn(e));}
  }else{
    const newId=uid();
    doctors.push({id:newId,name,login,email:login,password:'',role,spec:role==='admin'?'Адміністратор':(role==='manager'?'Менеджер':spec),extra,consultTitle});
  }
  save('mf_doctors',doctors);state.modal=null;state.editDoctor=null;r();
}

/* === v3_approved hotfix: normalize Firebase data shapes ===
   Fixes: draftConsultations.filter is not a function when Firebase stored mf_draft_consultations as object/null.
*/
function mfAsArray(value){
  if(Array.isArray(value)) return value;
  if(value && typeof value === 'object') return Object.values(value).filter(v => v !== null && v !== undefined);
  return [];
}
function mfAsObject(value){
  return (value && typeof value === 'object' && !Array.isArray(value)) ? value : {};
}
function mfAsBool(value, fallback=false){
  return typeof value === 'boolean' ? value : fallback;
}
function mfNormalizeSharedData(data){
  data = data || {};
  return {
    mf_specialists: mfAsArray(data.mf_specialists).length ? mfAsArray(data.mf_specialists) : [...DEFAULT_SPECIALISTS],
    mf_doctors: mfAsArray(data.mf_doctors),
    mf_patients: mfAsArray(data.mf_patients),
    mf_consultations: mfAsArray(data.mf_consultations),
    mf_delete_requests: mfAsArray(data.mf_delete_requests),
    mf_appointments: mfAsArray(data.mf_appointments),
    mf_appointment_alerts: mfAsArray(data.mf_appointment_alerts),
    mf_work_schedules: mfAsObject(data.mf_work_schedules),
    mf_fields: mfAsArray(data.mf_fields).length ? mfAsArray(data.mf_fields) : cloneFields(DEFAULT_FIELDS),
    mf_doctor_fields: mfAsObject(data.mf_doctor_fields),
    mf_field_templates: mfAsObject(data.mf_field_templates),
    mf_settings_collapsed: mfAsObject(data.mf_settings_collapsed),
    mf_delete_keyword: typeof data.mf_delete_keyword === 'string' ? data.mf_delete_keyword : 'ВИДАЛИТИ',
    mf_patient_notes: mfAsObject(data.mf_patient_notes),
    mf_draft_consultations: mfAsArray(data.mf_draft_consultations),
    mf_weekly_work_schedules: mfAsObject(data.mf_weekly_work_schedules),
    mf_side_delete_enabled: mfAsBool(data.mf_side_delete_enabled, false),
    mf_viewed_consult_datetime: mfAsObject(data.mf_viewed_consult_datetime),
    mf_patient_events: mfAsArray(data.mf_patient_events)
  };
}
mfDefaultSharedData=function(){
  return mfNormalizeSharedData({});
};
mfApplyCloudData=function(data){
  window.MED_APPLYING_CLOUD=true;
  const normalized = mfNormalizeSharedData(data || {});
  specialists = normalized.mf_specialists;
  doctors = normalized.mf_doctors;
  patients = normalized.mf_patients;
  consultations = normalized.mf_consultations;
  deleteRequests = normalized.mf_delete_requests;
  appointments = normalized.mf_appointments;
  appointmentAlerts = normalized.mf_appointment_alerts;
  workSchedules = normalized.mf_work_schedules;
  consultationFields = normalized.mf_fields;
  doctorFields = normalized.mf_doctor_fields;
  fieldTemplates = normalized.mf_field_templates;
  settingsCollapsed = normalized.mf_settings_collapsed;
  deleteKeyword = normalized.mf_delete_keyword;
  if(typeof patientNotes !== 'undefined') patientNotes = normalized.mf_patient_notes;
  if(typeof draftConsultations !== 'undefined') draftConsultations = normalized.mf_draft_consultations;
  if(typeof weeklyWorkSchedules !== 'undefined') weeklyWorkSchedules = normalized.mf_weekly_work_schedules;
  if(typeof sideDeleteEnabled !== 'undefined') sideDeleteEnabled = normalized.mf_side_delete_enabled;
  if(typeof viewedConsultDateTime !== 'undefined') viewedConsultDateTime = normalized.mf_viewed_consult_datetime;
  if(typeof patientEvents !== 'undefined') patientEvents = normalized.mf_patient_events;
  Object.keys(normalized).forEach(k=>{try{localStorage.setItem(k,JSON.stringify(normalized[k]))}catch(e){}});
  window.MED_APPLYING_CLOUD=false;
};
mfEnsureSharedData=async function(){
  const ref=mfDb.ref(MF_SHARED_PATH);
  const snap=await ref.get();
  const raw=snap.exists() ? (snap.val() || {}) : {};
  const normalized=mfNormalizeSharedData(raw);
  if(!snap.exists()){
    if(Array.isArray(doctors)&&doctors.length) normalized.mf_doctors=doctors;
    await ref.set(normalized);
  }else{
    const updates={};
    Object.keys(normalized).forEach(k=>{
      const oldVal=raw[k];
      const newVal=normalized[k];
      const oldType=Array.isArray(oldVal)?'array':(oldVal===null?'null':typeof oldVal);
      const newType=Array.isArray(newVal)?'array':(newVal===null?'null':typeof newVal);
      if(oldVal===undefined || oldType!==newType) updates[k]=newVal;
    });
    if(Object.keys(updates).length) await ref.update(updates);
  }
  mfApplyCloudData(normalized);
};


/* === v3.36 UX hotfixes ===
   1) safe settings collapse keys (no Firebase-invalid characters like /)
   2) booking buffer: cannot book if slot starts in <5 minutes
   3) jump to schedule settings from cabinet
   4) consultations sorted newest first
   5) duplicate from consultation panel keeps selected patient
*/
function mfSafeKeyPart(text){
  try{
    return btoa(unescape(encodeURIComponent(String(text||'')))).replace(/[.#$\/[\]]/g,'_');
  }catch(e){
    return encodeURIComponent(String(text||'')).replace(/[.#$\/[\]%]/g,'_');
  }
}
function mfCleanSettingsCollapsed(){
  if(!settingsCollapsed || typeof settingsCollapsed !== 'object' || Array.isArray(settingsCollapsed)) settingsCollapsed={};
  Object.keys(settingsCollapsed).forEach(k=>{ if(/[.#$\/[\]]/.test(k)) delete settingsCollapsed[k]; });
}
settingKey=function(title){return `u${state.doctor?.id||0}_${mfSafeKeyPart(String(title||'').trim())}`};
isSettingCollapsed=function(title){mfCleanSettingsCollapsed();return !!settingsCollapsed[settingKey(title)]};
toggleSetting=function(title){
  mfCleanSettingsCollapsed();
  const k=settingKey(title);
  settingsCollapsed[k]=!settingsCollapsed[k];
  save('mf_settings_collapsed',settingsCollapsed);
  r();
};
enhanceSettingsToggles=function(){
  if(state.page!=='settings')return;
  document.querySelectorAll('.main-content > .card').forEach(card=>{
    if(card.dataset.toggleReady==='1')return;
    const title=card.querySelector(':scope > .card-title');
    if(!title)return;
    const t=title.textContent.trim();
    const head=document.createElement('div');
    head.className='setting-head';
    const btn=document.createElement('button');
    btn.type='button';
    btn.className='setting-toggle';
    btn.textContent=isSettingCollapsed(t)?'Розгорнути':'Згорнути';
    title.parentNode.insertBefore(head,title);
    head.appendChild(title);
    head.appendChild(btn);
    const body=document.createElement('div');
    body.className='setting-body'+(isSettingCollapsed(t)?' collapsed':'');
    while(head.nextSibling) body.appendChild(head.nextSibling);
    card.appendChild(body);
    const doToggle=(e)=>{e.preventDefault();e.stopPropagation();toggleSetting(t)};
    btn.addEventListener('click',doToggle);
    title.style.cursor='pointer';
    title.addEventListener('click',doToggle);
    card.dataset.toggleReady='1';
  });
};

function isSlotClosedForBooking(date,startTime){
  const start=new Date(String(date)+'T'+String(startTime||'00:00')+':00');
  return start.getTime() - Date.now() < 5*60*1000;
}

patientConsults=function(pid){
  return consultations
    .filter(c=>String(c.patientId)===String(pid)&&canViewConsultation(c))
    .sort((a,b)=>{
      const bd=String(b.date||'');
      const ad=String(a.date||'');
      if(bd!==ad) return bd.localeCompare(ad);
      return String(b.createdAt||b.updatedAt||'').localeCompare(String(a.createdAt||a.updatedAt||''));
    });
};
